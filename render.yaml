services:
  - type: web
    name: azelia-landing
    runtime: node
    plan: free
    # --include=dev forces build tools (vite, esbuild, tsc) to install even
    # though NODE_ENV=production would otherwise skip devDependencies.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Impostate questi due valori dal pannello Render (Environment).
      # sync:false = Render li chiede a te e NON li salva nel repository.
      - key: MAILERLITE_API_KEY
        sync: false
      - key: MAILERLITE_GROUP_ID
        sync: false
